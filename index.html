<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>VERIS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="stylesheet.css">

</head>

<body>

    <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">

        <div class="popup-wrapper">

            <header class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="logo mb-1">

                        <i class="bi bi-shield-check"></i>

                        VERIS

                    </h2>

                    <p class="subtitle mb-0">

                        Verify. Analyze. Trust.

                    </p>

                </div>

                <button
                    id="scanPage"
                    type="button"
                    class="btn scan-btn">

                    <i class="bi bi-search"></i>

                    Scan

                </button>

            </header>

            <ul class="nav nav-pills nav-fill mb-4">

                <li class="nav-item">

                    <button
                        type="button"
                        class="nav-link active tab"
                        data-mode="text">

                        <i class="bi bi-file-earmark-text"></i>

                        Text

                    </button>

                </li>

                <li class="nav-item">

                    <button
                        type="button"
                        class="nav-link tab"
                        data-mode="image">

                        <i class="bi bi-image"></i>

                        Image

                    </button>

                </li>

            </ul>

            <section id="textPanel">

                <div class="card custom-card mb-4">

                    <div class="card-body">

                        <label
                            for="textInput"
                            class="section-title">

                            Paste Content

                        </label>

                        <textarea
                            id="textInput"
                            rows="6"
                            class="form-control"
                            placeholder="Paste text here or click Scan to analyze selected webpage content."></textarea>

                        <button
                            id="detectText"
                            type="button"
                            class="btn analyze-btn w-100 mt-3">

                            <i class="bi bi-lightning-charge-fill"></i>

                            Analyze Content

                        </button>

                    </div>

                </div>                
                <div class="card custom-card mb-4">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center mb-3">

                            <div>

                                <p class="section-title mb-1">
                                    AI Possibility
                                </p>

                                <h2 id="textScore" class="score mb-2">
                                    Ready
                                </h2>

                            </div>

                            <div class="score-icon">

                                <i class="bi bi-shield-check"></i>

                            </div>

                        </div>

                        <div id="textMeter" class="progress">

                            <div
                                class="progress-bar"
                                role="progressbar"
                                style="width:0%">
                            </div>

                        </div>

                        <p
                            id="textSummary"
                            class="summary mt-3 mb-0">

                            Paste at least 80 words for an accurate analysis.

                        </p>

                    </div>

                </div>

                <div class="card custom-card">

                    <div class="card-body">

                        <h6 class="section-title mb-3">

                            <i class="bi bi-stars"></i>

                            Analysis Insights

                        </h6>

                        <ul
                            id="signals"
                            class="list-group list-group-flush">

                        </ul>

                    </div>

                </div>

            </section>

            <section id="imagePanel" hidden>

                <div class="card custom-card">

                    <div class="card-body">

                        <label
                            for="imageInput"
                            class="section-title">

                            Upload Image

                        </label>

                        <input
                            id="imageInput"
                            type="file"
                            accept="image/*"
                            class="form-control mb-3">

                        <canvas
                            id="imageCanvas"
                            width="220"
                            height="220">
                        </canvas>

                        <div class="mt-4">

                            <div class="d-flex justify-content-between align-items-center mb-3">

                                <div>

                                    <p class="section-title mb-1">
                                        AI Image Possibility
                                    </p>

                                    <h2 id="imageScore" class="score mb-2">
                                        0%
                                    </h2>

                                </div>

                                <div class="score-icon">

                                    <i class="bi bi-image"></i>

                                </div>

                            </div>

                            <div id="imageMeter" class="progress">

                                <div
                                    class="progress-bar"
                                    role="progressbar"
                                    style="width:0%">
                                </div>

                            </div>

                            <p
                                id="imageSummary"
                                class="summary mt-3 mb-0">

                                Upload an image to begin analysis.

                            </p>

                        </div>

                    </div>

                </div>

            </section>

            <footer class="text-center mt-4">

                <small>

                    <i class="bi bi-shield-lock"></i>

                    Everything runs locally • No cloud • No API

                </small>

            </footer>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="popup.js"></script>

</body>

</html>
